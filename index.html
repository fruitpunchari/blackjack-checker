<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Blackjack Checker</title>

<link rel="stylesheet"
      href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

</head>

<body>

<div id="menu" class="screen">

    <h1>Blackjack Checker</h1>

    <button onclick="startScan('ace')">
        Dealer Shows Ace
    </button>

    <button onclick="startScan('ten')">
        Dealer Shows Ten
    </button>

</div>


<div id="scanner" class="screen hidden">

    <h1 id="scannerTitle">
        Preparing...
    </h1>

    <p id="status">
        Loading AI...
    </p>

</div>


<div id="result" class="screen hidden">

    <h1 id="resultText"></h1>

    <button onclick="resetApp()">
        New Hand
    </button>

</div>


<!-- Hidden camera -->
<video
    id="video"
    autoplay
    playsinline
    muted
    class="hidden">
</video>

<script src="script.js"></script>

</body>

</html>
