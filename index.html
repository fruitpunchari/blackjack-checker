<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Blackjack Checker</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="container">

        <!-- ========================================= -->
        <!-- Server Setup -->
        <!-- ========================================= -->

        <div id="setupScreen" class="screen hidden">

            <h1>Blackjack Checker</h1>

            <p class="subtitle">

                Enter the address of your AI server.

            </p>

            <input

                id="serverInput"

                type="text"

                placeholder="http://192.168.1.50:8000"

                autocomplete="off"

            >

            <button onclick="saveServer()">

                Save

            </button>

        </div>

        <!-- ========================================= -->
        <!-- Main Menu -->
        <!-- ========================================= -->

        <div id="menuScreen" class="screen hidden">

            <h1>Blackjack Checker</h1>

            <p class="subtitle">

                What card is the dealer showing?

            </p>

            <button onclick="startScan('ace')">

                Dealer Shows Ace

            </button>

            <button onclick="startScan('ten')">

                Dealer Shows Ten / Face

            </button>

            <button
                class="secondary"
                onclick="changeServer()">

                Change AI Server

            </button>

        </div>

        <!-- ========================================= -->
        <!-- Scanner -->
        <!-- ========================================= -->

        <div id="scannerScreen" class="screen hidden">

            <h2 id="scannerTitle">

                Preparing Camera...

            </h2>

            <video

                id="video"

                autoplay

                playsinline

                muted

            ></video>

            <p id="status">

                Initializing...

            </p>

        </div>

        <!-- ========================================= -->
        <!-- Result -->
        <!-- ========================================= -->

        <div id="resultScreen" class="screen hidden">

            <h1 id="resultText">

                Result

            </h1>

            <button onclick="newHand()">

                New Hand

            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
