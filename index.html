<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Blackjack Hole Card Checker</title>

    <link rel="stylesheet" href="style.css">

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

</head>

<body>

    <!-- ===================== -->
    <!-- MAIN MENU             -->
    <!-- ===================== -->

    <div id="menu">

        <h1>Blackjack Hole Card Checker</h1>

        <p>

            Select the dealer upcard.

        </p>

        <button onclick="startScan('ace')">

            Dealer Shows Ace

        </button>

        <button onclick="startScan('ten')">

            Dealer Shows Ten

        </button>

    </div>


    <!-- ===================== -->
    <!-- SCANNER PAGE          -->
    <!-- ===================== -->

    <div
        id="scanner"
        class="hidden">

        <h2 id="scannerTitle">

            Preparing Camera...

        </h2>

        <p id="status">

            Initializing...

        </p>

    </div>


    <!-- ===================== -->
    <!-- RESULT PAGE           -->
    <!-- ===================== -->

    <div
        id="result"
        class="hidden">

        <h1 id="resultText">

        </h1>

        <button onclick="resetApp()">

            New Hand

        </button>

    </div>


    <!-- Hidden camera -->

    <video
        id="video"
        autoplay
        playsinline
        muted
        class="hidden">
    </video>

    <script src="script.js"></script>

</body>

</html>
